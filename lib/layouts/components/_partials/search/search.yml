# Search Partial Example
# The search partial is rendered by the search-only section. Properties are
# read from the section entry itself (title, subtitle, placeholder), with
# behavior tuning under settings.

# Basic search section
sectionType: search-only
text:
  title: 'Search Components'
  subtitle: 'Find components, features, and documentation'
placeholder: 'Search components and documentation...'
settings:
  maxResults: 20
  minCharacters: 2

