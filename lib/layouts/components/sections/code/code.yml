  containerFields:
    inContainer: true
    isAnimated: true
    noMargin:
      top: false
      bottom: false
    noPadding:
      top: false
      bottom: false
    background:
      color: ""
      image: ""
      imageScreen: "none"
  code:
    filename: "example.js"
    showCopy: true
    content: |
      ```js
      /**
       * Example JavaScript function
       * @param {string} name - The name to greet
       * @returns {string} Greeting message
       */
      function greet(name) {
        return `Hello, ${name}!`;
      }

      // Usage example
      const message = greet('World');
      console.log(message); // Output: Hello, World!
      ```

