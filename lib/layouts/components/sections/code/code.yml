  code:
    filename: "styles.css"
    showCopy: true
    content: |
      ```css
      /* Modern CSS Grid Layout */
      .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
        padding: 2rem;
      }

      .card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 10px rgb(0 0 0 / 10%);
        padding: 1.5rem;
        transition: transform 0.2s ease;
      }

      .card:hover {
        transform: translateY(-4px);
      }
      ```

